<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Viên - Toukutei 2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .admin-info { background: #eff6ff; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #2563eb; font-size: 13px; color: #1e40af; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1e40af; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; color: white; margin-right: 5px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-reset { background: #f59e0b; }
        .btn-ban { background: #ef4444; }
        .btn-unban { background: #10b981; }
        .btn-premium { background: #8b5cf6; }
        .btn-refresh { background: #64748b; }
        
        .status-active { color: #059669; font-weight: bold; }
        .status-banned { color: #dc2626; font-weight: bold; }
        .badge-premium { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #f59e0b; }
        .badge-free { background: #f3f4f6; color: #4b5563; padding: 4px 8px; border-radius: 4px; font-size: 11px; border: 1px solid #d1d5db; }
        
        .badge-g1 { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #bbf7d0; }
        .badge-g2 { background: #fef9c3; color: #854d0e; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #fef08a; }
        .group-select { padding: 5px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 12px; margin-top: 5px; cursor: pointer; display: block; }
        
        .device-id { font-family: monospace; font-size: 11px; background: #f1f5f9; padding: 4px; display: block; margin-top: 6px; color: #64748b; border-radius: 4px; word-break: break-all; }
        #loading { font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Quản Lý Học Viên 海洋（かいよう）土木（どぼく）</h2>
        <button class="btn btn-refresh" onclick="location.reload()">🔄 Làm mới danh sách</button>
    </div>

    <div class="admin-info" id="current-admin-device">Đang xác thực quyền quản trị...</div>

    <div id="loading" style="text-align:center; padding: 40px;">🚀 Đang kết nối hệ thống Firestore...</div>

    <table id="adminTable" style="display:none;">
        <thead>
            <tr>
                <th>Học viên</th>
                <th>Phân Nhóm</th>
                <th>Gói học</th>
                <th>Thiết bị</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="userList"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALblbqW_VrZh2r7sPJ8Q6XT2fGbk0dsFg",
        authDomain: "donghung-3208d.firebaseapp.com",
        projectId: "donghung-3208d",
        storageBucket: "donghung-3208d.firebasestorage.app",
        messagingSenderId: "753379492663",
        appId: "1:753379492663:web:baff34f2c0bac00e02d0b2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // KIỂM TRA ĐĂNG NHẬP VÀ QUYỀN ADMIN
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            
            if (!userDoc.exists() || userDoc.data().role !== 'admin') {
                alert("🚫 Lỗi: Bạn không có quyền truy cập trang quản trị!");
                window.location.href = "index.html";
                return;
            }

            // Hiển thị thông tin máy Admin
            const myDeviceId = localStorage.getItem('my_device_id') || "Chưa xác định";
            document.getElementById('current-admin-device').innerHTML = `Chào Admin: <b>${userDoc.data().name}</b> | Thiết bị: ${navigator.platform}`;
            
            // Tải dữ liệu
            fetchUsers();
        } catch (error) {
            console.error(error);
            alert("Lỗi xác thực hệ thống!");
        }
    });

    async function fetchUsers() {
        try {
            const querySnapshot = await getDocs(collection(db, "users"));
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            querySnapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const uid = userDoc.id;
                const userGroup = data.group || "1";
                let deviceIdText = "Chưa có máy";

                if (data.devices && Object.keys(data.devices).length > 0) {
                    deviceIdText = Object.keys(data.devices)[0];
                }

                const row = `
                    <tr>
                        <td>
                            <strong>${data.name || 'Học viên mới'}</strong><br>
                            <small style="color: #64748b">${data.email}</small>
                        </td>
                        <td>
                            ${userGroup === '1' ? '<span class="badge-g1">NHÓM 1</span>' : '<span class="badge-g2">NHÓM 2</span>'}
                            <select class="group-select" onchange="window.changeGroup('${uid}', this.value)">
                                <option value="1" ${userGroup === '1' ? 'selected' : ''}>➡️ Nhóm 1</option>
                                <option value="2" ${userGroup === '2' ? 'selected' : ''}>➡️ Nhóm 2</option>
                            </select>
                        </td>
                        <td>
                            ${data.isPremium ? '<span class="badge-premium">⭐ PREMIUM</span>' : '<span class="badge-free">MIỄN PHÍ</span>'}
                        </td>
                        <td>
                            <b>${data.device_count || 0}/1</b>
                            <span class="device-id">${deviceIdText}</span>
                        </td>
                        <td class="${data.status === 'banned' ? 'status-banned' : 'status-active'}">
                            ${data.status === 'banned' ? '🚫 Đã khóa' : '✅ Hoạt động'}
                        </td>
                        <td>
                            <button class="btn btn-premium" onclick="window.togglePremium('${uid}', ${!data.isPremium})">
                                ${data.isPremium ? 'Hạ cấp' : 'Mở Premium'}
                            </button>
                            <button class="btn btn-reset" onclick="window.resetDevice('${uid}')">Reset Máy</button>
                            <button class="btn ${data.status === 'banned' ? 'btn-unban' : 'btn-ban'}" 
                                    onclick="window.toggleStatus('${uid}', '${data.status === 'banned' ? 'active' : 'banned'}')">
                                ${data.status === 'banned' ? 'Mở khóa' : 'Khóa'}
                            </button>
                        </td>
                    </tr>
                `;
                userList.innerHTML += row;
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('adminTable').style.display = 'table';
        } catch (e) {
            document.getElementById('loading').innerHTML = "❌ Lỗi tải dữ liệu: " + e.message;
        }
    }

    // GẮN HÀM VÀO WINDOW ĐỂ NÚT BẤM HOẠT ĐỘNG
    window.changeGroup = async (uid, newGroup) => {
        if (confirm(`Chuyển học viên sang Nhóm ${newGroup}?`)) {
            await updateDoc(doc(db, "users", uid), { group: newGroup });
            location.reload();
        }
    };

    window.togglePremium = async (uid, newStatus) => {
        if (confirm(newStatus ? "Nâng cấp Premium cho học viên này?" : "Hạ cấp xuống bản Free?")) {
            await updateDoc(doc(db, "users", uid), { isPremium: newStatus });
            location.reload();
        }
    };

    window.resetDevice = async (uid) => {
        if (confirm("Xác nhận Reset thiết bị?")) {
            await updateDoc(doc(db, "users", uid), { device_count: 0, devices: {} });
            alert("Đã reset thiết bị thành công!");
            location.reload();
        }
    };

    window.toggleStatus = async (uid, newStatus) => {
        if (confirm("Thay đổi trạng thái tài khoản này?")) {
            await updateDoc(doc(db, "users", uid), { status: newStatus });
            location.reload();
        }
    };

</script>
</body>
</html>
