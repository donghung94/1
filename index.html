<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đồng Hùng nikken – Quiz</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="style.css">

  <!-- ⚡ Prefetch: tải sẵn dữ liệu đề để khi người dùng bấm sẽ mở ngay lập tức -->
  <link rel="prefetch" href="questions.js">
  <link rel="prefetch" href="questions2.js">
  <link rel="prefetch" href="questions3.js">
  <link rel="prefetch" href="questions4.js">
</head>

<body class="mono">
<header class="header">
  <div class="brand">
    <img src="icon-192.png" alt="H" class="logo">
    <div class="titles">
      <div class="brand-name">Đồng Hùng nikken</div>
      <div class="subtitle">đề lý thuyết nhóm 2</div>
      <div class="demoline">(Bản demo)</div>
    </div>
  </div>
</header>

<main class="container">
  <div class="card">
    <h2>Chọn đề thi</h2>
    <!-- ✅ Danh sách đề sẽ tự sinh ở đây -->
    <ul id="exam-list" class="exam-list"></ul>
  </div>
</main>

<footer class="footer">© 2025 Đồng Hùng nikken • PWA Quiz</footer>

<script>
  // 🧩 Tự động tạo danh sách đề dựa theo số lượng TOTAL_SETS
  const examList = document.getElementById('exam-list');
  const TOTAL_SETS = 4; // ← cập nhật số lượng đề ở đây khi thêm đề mới

  for (let i = 1; i <= TOTAL_SETS; i++) {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = `exam.html?set=${i}`;
    a.textContent = `Lý thuyết nhóm 2 – Đề ${i}`;
    li.appendChild(a);
    examList.appendChild(li);
  }

  // 🧱 Đăng ký service worker để chạy PWA offline
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
  }
</script>
</body>
</html>
