<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập – Đồng Hùng Nikken</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="mono">
  <main class="container">
    <div class="card">
      <h2>Đăng nhập vào hệ thống</h2>

      <label>Email:</label>
      <input type="email" id="email" placeholder="Nhập email" required>

      <label>Mật khẩu:</label>
      <input type="password" id="password" placeholder="Nhập mật khẩu" required>

      <button id="loginBtn" class="btn">Đăng nhập</button>
    </div>
  </main>

  <footer class="footer">© 2025 Đồng Hùng Nikken</footer>

  <script type="module">
    import { auth } from "./firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const emailInput = document.getElementById("email");
    const passInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passInput.value.trim();

      if (!email || !password) {
        alert("Vui lòng nhập đầy đủ email và mật khẩu!");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Đăng nhập thành công!");
        location.href = "index.html"; // chuyển về trang chính
      } catch (error) {
        console.error(error);
        alert("Sai tài khoản hoặc mật khẩu.\nVui lòng liên hệ admin để được cấp quyền!");
      }
    });
  </script>
</body>
</html>
